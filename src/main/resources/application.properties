spring.application.name=api
api.security.token.secret=${JWT_SECRET}


# Força o Spring Boot a tentar ler o arquivo .env da raiz do projeto automaticamente!
spring.config.import=optional:file:.env[.properties]

# Configurações do Banco de Dados PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:vaultpay}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do JPA e Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Como vocês estão usando Flyway agora, mas podem ter usado o Hibernate para criar o banco no início, 'update' ajuda no dev local
spring.jpa.hibernate.ddl-auto=update

# Configurações do Flyway
spring.flyway.enabled=true
# Essa configuração é crucial: se o banco já existir (criado pelo Hibernate), o Flyway cria uma "linha de base" e não quebra
spring.flyway.baseline-on-migrate=true
